{% extends 'base.html' %}

{% block title %}Đặt lại mật khẩu{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 50px; margin-bottom: 50px;">
    <div class="card">
        <div class="card-header bg-primary text-white text-center">
            <h3 class="mb-0">Đặt lại mật khẩu</h3>
        </div>
        <div class="card-body">
            <p>Nhập địa chỉ email của bạn, chúng tôi sẽ gửi đến bạn một liên kết để đặt lại mật khẩu.</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg w-100">
                    <i class="fas fa-paper-plane"></i> Gửi hướng dẫn
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
