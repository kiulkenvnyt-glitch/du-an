{% extends 'base.html' %}

{% block title %}Đổi mật khẩu thành công{% endblock %}

{% block content %}
<div class="container py-5">

        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Đổi mật khẩu thành công</h4>
                </div>

                    <p>Mật khẩu của bạn đã được thay đổi thành công.</p>
                    <a href="{% url 'profile' %}" class="btn btn-primary">Về hồ sơ</a>

            </div>
        </div>
    </div>
</div>
{% endblock %}
